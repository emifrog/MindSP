version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: mindsp-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: mindsp
      POSTGRES_PASSWORD: mindsp_password
      POSTGRES_DB: mindsp
      POSTGRES_MULTIPLE_DATABASES: mindsp_public,mindsp_tenant
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/postgres-init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - mindsp-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mindsp"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mindsp-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - mindsp-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: mindsp-minio
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: mindsp_admin
      MINIO_ROOT_PASSWORD: mindsp_password
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    networks:
      - mindsp-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  mailhog:
    image: mailhog/mailhog:latest
    container_name: mindsp-mailhog
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    networks:
      - mindsp-network

networks:
  mindsp-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data: